<!DOCTYPE html>
<html>
<head>
<title>Go with Ko Rules</title>
</head>
<body>

<div id="turn-indicator">Black's turn</div>
<canvas id="go-board" width="520" height="520" style="background-color: #F0D095;"></canvas>
<button id="Pass">Pass</button>
<button id="Tally">Tally up points/End game</button>
<script>
    const canvas = document.getElementById('go-board');
    const ctx = canvas.getContext('2d');
    const size = 19;  // 19x19 board
    const margin = 30;
    const cellSize = (canvas.width - 2 * margin) / (size - 1);


    // Draw grid lines
    function drawBoard() {
        for (let i = 0; i < size; i++) {
            ctx.beginPath();
            // Vertical lines
            ctx.moveTo(margin + i * cellSize, margin);
            ctx.lineTo(margin + i * cellSize, canvas.height - margin);
            // Horizontal lines
            ctx.moveTo(margin, margin + i * cellSize);
            ctx.lineTo(canvas.width - margin, margin + i * cellSize);
            ctx.stroke();
        }

        // Draw star points (hoshii)
        const starPoints = [3, 9, 15];  // for 19x19
        for (let i of starPoints) {
            for (let j of starPoints) {
                if ((i === 3 || i === 15) && (j === 3 || j === 15)) continue;
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(margin + i * cellSize, margin + j * cellSize, 4, 0, 2 * Math.PI);
                ctx.fill();
            }
        }
    }
    //remeber black goes first
    let currentPlayer = 'X';  // X for black, O for white (or vice versa)

function updateTurn(nextPlayer) {
    currentPlayer = nextPlayer;
    document.getElementById('turn-indicator').textContent =
        currentPlayer === 'X' ? "Black's turn" : "White's turn";
}

function updateBoard(boardData) {
    // Clear the entire canvas first
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Redraw the grid lines
    drawBoard();  // Your existing function that draws lines and star points

    // Loop through the board and draw all stones
    for (let row = 0; row < boardData.length; row++) {
        for (let col = 0; col < boardData[row].length; col++) {
            if (boardData[row][col] === 'X') {
                drawStone(row, col, 'X');
            } else if (boardData[row][col] === 'O') {
                drawStone(row, col, 'O');
            }
        }
    }
}


let consecutivePasses = 0;  // Track consecutive passes
let gameActive = true;       // Whether the game is still being played

// Pass button handler
document.getElementById('Pass').addEventListener('click', () => {
    if (!gameActive) return;

    consecutivePasses++;

    if (consecutivePasses >= 2) {
        // Game over - both players passed
        gameActive = false;
        document.getElementById('turn-indicator').textContent = "Game over! Click 'Tally points' to score.";
    } else {
        // Switch turns without placing a stone
        currentPlayer = (currentPlayer === 'X') ? 'O' : 'X';
        updateTurn(currentPlayer);
    }
});

// Tally button handler
document.getElementById('Tally').addEventListener('click', () => {
    if (gameActive) {
        alert("Game isn't over yet! Both players must pass first.");
        return;
    }

    // Fetch the score from Flask
    fetch('/score', {
        method: 'GET',
        headers: {'Content-Type': 'application/json'}
    })
    .then(response => response.json())
    .then(data => {
        alert(`Black (X): ${data.black}\nWhite (O): ${data.white}\nNeutral: ${data.neutral}`);
    });



    fetch('/clearboard', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'}
    })
    .then(response => response.json())
    .then(data => {
        updateBoard(data.board)
    });






});
drawBoard();
    // Handle clicks


    canvas.addEventListener('click', (e) => {
       if (!gameActive) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        let x = (e.clientX - rect.left) * scaleX;
        let y = (e.clientY - rect.top) * scaleY;

        const row = Math.round((y - margin) / cellSize);
        const col = Math.round((x - margin) / cellSize);

        if (row >= 0 && row < size && col >= 0 && col < size) {
            // Send move to Flask
            fetch('/move', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({row: row, col: col, player: currentPlayer})
            })
            .then(response => response.json())
            .then(data => {
                if (data.waslegal) {
                    consecutivePasses = 0;
                     drawStone(row, col, currentPlayer);
                     updateTurn(data.next_player);
                     updateBoard(data.board);
                      } else {
                     alert("Illegal move!");
}
            });
        }
    });

    function drawStone(row, col, color) {
        const x = margin + col * cellSize;
        const y = margin + row * cellSize;
        const radius = cellSize * 0.4;

        ctx.beginPath();
        ctx.arc(x, y, radius, 0, 2 * Math.PI);
        ctx.fillStyle = color === 'X' ? 'black' : 'white';
        ctx.fill();
        ctx.strokeStyle = '#333';
        ctx.stroke();
    }
</script>




</body>
</html>
